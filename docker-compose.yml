services:
  db:
    image: mcr.microsoft.com/mssql/server:2025-latest
    environment:
      ACCEPT_EULA: "Y"
      SA_PASSWORD: "VeryStrong@Passw0rd"
      MSSQL_PID: "Express"
    ports:
      - "1433:1433"
    healthcheck:
      test:
        - CMD-SHELL
        - /opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P "VeryStrong@Passw0rd" -Q "SELECT 1" -No -C
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "5000:5000"
      - "5001:5001"
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: "https://+:5001;http://+:5000"
      ASPNETCORE_Kestrel__Certificates__Default__Path: /https/aspnetapp.pfx
      ASPNETCORE_Kestrel__Certificates__Default__Password: "CertPassword123!"
      ConnectionStrings__DefaultConnection: "Server=db,1433;Database=FundoLoanDb;User Id=sa;Password=VeryStrong@Passw0rd;TrustServerCertificate=True;"
    volumes:
      - ${USERPROFILE}/.aspnet/https:/https:ro
    depends_on:
      db:
        condition: service_healthy
